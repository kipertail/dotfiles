general {
    no_fade_in = false
    no_fade_out = false
    ignore_empty_input = false
    hide_cursor = true
}

background {
    monitor =
    path = /tmp/lockscreen.png
    color = rgba(0, 0, 0, 0.0)
    blur_passes = 3
    blur_size = 16           # Уменьшил размер размытия (меньше "мыла" — больше четкости)
    
    # Вот эти параметры делают картинку светлее:
    brightness = 0.5       # Значение от 0.0 до 1.0. Ближе к 1.0 — яркость оригинала.
    contrast = 1.0          # Оставьте 1.0 (стандарт) или поднимите до 1.1 для яркости
    vibrancy = 0.2          # Немного увеличит насыщенность цветов
    vibrancy_darkness = 0.0 # Не затемняет темные участки
}

input-field {
    monitor =
    size = 300, 60
    outline_thickness = 3
    dots_size = 0.2
    dots_spacing = 0.2
    dots_center = true
    outer_color = rgb(59, 66, 82)
    inner_color = rgb(40, 44, 52)
    font_color = rgb(200, 200, 200)
    fade_on_empty = false
    placeholder_text = <i>Пароль...</i>
    hide_input = false
    position = 0, -100
    halign = center
    valign = center
}

# Время
label {
    monitor =
    text = $TIME
    color = rgba(200, 200, 200, 1.0)
    font_size = 80
    font_family = JetBrainsMono Nerd Font
    position = 0, 50
    halign = center
    valign = center
}

# Дата
label {
    monitor =
    text = $CUSTOM_DATE
    color = rgba(200, 200, 200, 1.0)
    font_size = 18
    font_family = JetBrainsMono Nerd Font
    position = 0, -30
    halign = center
    valign = center
}
