#Monitors

monitor=eDP-1,1920x1080@60,0x0,1
monitor=HDMI-A-2,1920x1200@60,1920x0,1

#autostart
exec-once = waybar
exec-once = awww-daemon
exec-once = swaync
exec-once = /usr/lib/xdg-desktop-portal-hyprland
exec-once = sleep 2 && /usr/lib/xdg-desktop-portal
exec-once = sleep 0.1 && awww img /home/user/wallpapers/NG.M.04360\ Publisering\ 20250515.jpg --outputs eDP-1
exec-once = sleep 0.1 && awww img awww img /home/user/wallpapers/NG.M.04360\ Publisering\ 20250515.jpg --outputs HDMI-A-2
exec-once = /usr/lib/polkit-kde-authentication-agent-1
exec-once = gsettings set org.gnome.desktop.interface gtk-theme "Adwaita-dark"
exec-once = gsettings set org.gnome.desktop.interface icon-theme "Papirus-Dark"
exec-once = sleep 3 && nwg-look -a
exec-once = ~/.config/hypr/scripts/portal-hyprland
exec-once = /usr/lib/tumbler-1/tumblerd &
exec-once = ~/.config/hypr/scripts/monitor-setup.sh
exec-once = gnome-keyring-daemon --start --components=secrets,ssh
exec-once = export $(gnome-keyring-daemon --start --components=secrets,ssh)

env = GTK_THEME,Adwaita-dark
env = XCURSOR_THEME,Adwaita
env = HYPRSHOT_DIR,/home/user/screenshots


#input conf
input {
    kb_layout = us,ru
    kb_options = grp:win_space_toggle
    follow_mouse = 1
    sensitivity = 0.1
    touchpad {
        natural_scroll = true
    }
}

device {
    name = -------2.4g-wireless-mouse
    sensitivity = -0.75
}

general {
  gaps_in = 0
  gaps_out = 0
  border_size = 0
  # col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
  # col.active_border = rgba(ffffffff)
  col.active_border = rgba(ffffffff) rgba(ddddddff) 45deg
  col.inactive_border = rgba(595959aa)
  layout = dwindle
}

bindm = SUPER CTRL, mouse:272, resizewindow

# Только быстрая анимация открытия/закрытия окон, остальное выключено
animations {
    enabled = yes

    bezier = quick, 0.05, 0.9, 0.1, 1

    animation = windows, 1, 2, quick, popin 90%
    animation = windowsIn, 1, 2, quick, popin 90%
    animation = windowsOut, 1, 2, quick, popin 90%

    animation = workspaces, 0
    animation = fade, 0
    animation = fadeIn, 0
    animation = fadeOut, 0
    animation = fadeSwitch, 0
    animation = fadeShadow, 0
    animation = fadeDim, 0
    animation = border, 0
    animation = borderangle, 0
}

decoration {
    rounding = 10             
    blur {
        enabled = true
        size = 5
        passes = 2
        new_optimizations = true
        xray = true        
    }
    
    shadow {
        enabled = true
        range = 12
        render_power = 3
        color = rgba(1a1a1a99)
    }
}

dwindle {
  preserve_split = true 
}


# hotkeys

bind = SUPER, Q, exec, kitty
bind = SUPER, W, killactive,
bind = SUPER, M, exit,
bind = SUPER, E, exec, thunar
bind = SUPER, F, fullscreen,
bind = SUPER, V, togglefloating,
bind = SUPER, R, exec, ~/.config/rofi/launchers/type-3/launcher.sh
bind = SUPER, P, pseudo, # dwindle
# переключение режима разделения
bind = SUPER, J, layoutmsg, togglesplit
bind = SUPER, S, exec, firefox
bind = SUPER, D, exec, Telegram
bind = SUPER, L, exec, ~/.config/hypr/lock.sh
bind = SUPER, B, exec, ~/.config/rofi/rofi-wifi-menu.sh
bind = SUPER, N, exec, ~/.config/rofi/bluetooth-menu.sh
bind = SUPER, I, exec, hyprshot -m region
bind = SUPER, H, exec, ~/.config/hypr/toggle-waybar.sh
bind = SUPER, U, exec, ~/.config/hypr/lock.sh & systemctl suspend
# focus swap

bind = SUPER, left, movefocus, l
bind = SUPER, right, movefocus, r
bind = SUPER, up, movefocus, u
bind = SUPER, down, movefocus, d

# Переключение фокуса между мониторами
bind = SUPER, bracketleft, focusmonitor, -1
bind = SUPER, bracketright, focusmonitor, +1

workspace = 1, monitor:eDP-1, default:true
workspace = 2, monitor:HDMI-A-2
workspace = 3, monitor:HDMI-A-2
workspace = 4, monitor:HDMI-A-2
workspace = 5, monitor:HDMI-A-2
workspace = 6, monitor:HDMI-A-2
workspace = 7, monitor:HDMI-A-2
workspace = 8, monitor:HDMI-A-2
workspace = 9, monitor:HDMI-A-2 

# workspace swap

bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5
bind = SUPER, 6, workspace, 6
bind = SUPER, 7, workspace, 7
bind = SUPER, 8, workspace, 8
bind = SUPER, 9, workspace, 9


# windows swap

bind = SUPER SHIFT, 1, movetoworkspace, 1
bind = SUPER SHIFT, 2, movetoworkspace, 2
bind = SUPER SHIFT, 3, movetoworkspace, 3
bind = SUPER SHIFT, 4, movetoworkspace, 4
bind = SUPER SHIFT, 5, movetoworkspace, 5
bind = SUPER SHIFT, 6, movetoworkspace, 6
bind = SUPER SHIFT, 7, movetoworkspace, 7
bind = SUPER SHIFT, 8, movetoworkspace, 8
bind = SUPER SHIFT, 9, movetoworkspace, 9

# swap workspaces 

bind = SUPER, mouse_down, workspace, e+1
bind = SUPER, mouse_up, workspace, e-1


#workspace mouse

bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow

#contrast audio

bind = , XF86MonBrightnessUp, exec, brightnessctl set +5%
bind = , XF86MonBrightnessDown, exec, brightnessctl set 5%-
# bind = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
# bind = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
# bind = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bind = , XF86AudioRaiseVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ +5%
bind = , XF86AudioLowerVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ -5%
bind = , XF86AudioMute, exec, pactl set-sink-mute @DEFAULT_SINK@ toggle
